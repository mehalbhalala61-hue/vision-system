# =============================================================================
# alembic.ini — Alembic DB Migration Config
# =============================================================================
# Usage:
#   alembic init alembic        # already done — folder exists
#   alembic revision --autogenerate -m "create meal_logs"
#   alembic upgrade head        # apply migrations
#   railway run alembic upgrade head  # on Railway
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# DATABASE_URL read from environment — never hardcode here
sqlalchemy.url = %(DATABASE_URL)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S